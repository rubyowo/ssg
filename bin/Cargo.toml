[package]
name = "bin"
version = "0.1.0"
edition = "2024"

[dependencies]
lib = { path = "../lib" }
axum = "0.8"
tower-http = { version = "0.6", features = ["trace"] }
tower-livereload = "0.10"
notify = "8.2"
tokio = { version = "1.48", features = ["full"] }
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }
log = "0.4"
tracing-subscriber = "0.3"
minify-html = "0.18"