[package]
name = "bin"
version = "0.1.0"
edition = "2024"

[dependencies]
lib = { path = "../lib" }
axum = { version = "0.8", features = ["macros"] }
axum-macros = { version = "0.5.0-rc.1" }
# axum = "0.8"
tower-http = { version = "0.7", features = ["trace"] }
tower-livereload = "0.10"
notify = "8.2"
tokio = { version = "1.52", features = ["full"] }
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }
log = "0.4"
tracing-subscriber = "0.3"
arborium-theme = { git = "https://github.com/rubyowo/arborium", branch = "build", version = "2.6.0" }
minify-html = "0.18"
toml = "1.1.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
globset = "0.4"
once_cell = "1.21"
mime_guess = "2.0.5"
rhai = { version = "1.25", features = ["serde", "sync"] }
futures = "0.3.32"
hotpath = "0.21"

[features]
hotpath = ["hotpath/hotpath"]
hotpath-cpu = ["hotpath/hotpath-cpu"]
hotpath-alloc = ["hotpath/hotpath-alloc"]